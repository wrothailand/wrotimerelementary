<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WRO LAP TIMER HYBRID PRO</title>
  <!-- Google Fonts & SweetAlert2 -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=JetBrains+Mono:wght@600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --primary: #0284c7;
      --warning: #f59e0b;
      --success: #16a34a;
      --danger: #dc2626;
      --text-main: #0f172a;
      --text-sub: #334155;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Kanit', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      width: 95%;
      max-width: 500px;
      height: 90vh;
      background: var(--card);
      padding: 1.5rem 1.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      border: 1px solid #cbd5e1;
    }

    .header-info { margin-top: 0.2rem; }
    .version-tag { font-size: 0.75rem; color: var(--text-sub); font-weight:600; opacity: 0.7; letter-spacing: 1px; }

    #save-zone {
      min-height: 45px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 5px;
    }
    .btn-save-top {
      background: var(--success);
      color: white;
      border: none;
      padding: 8px 24px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
      animation: pulseGlow 1.5s infinite;
      font-family: 'Kanit';
    }

    .timer-display {
      font-size: clamp(5rem, 22vw, 8.5rem);
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-main);
      margin: 0.2rem 0;
      transition: color 0.1s ease;
      display: inline-block;
      width: 100%;
    }
    
    .timer-display.counting { color: var(--primary); }
    
    .timer-display.warning-active {
      color: var(--danger);
      animation: pulseGlow 1.5s infinite;
    }

    @keyframes pulseGlow {
      0% { transform: scale(1); filter: drop-shadow(0 2px 4px rgba(220, 38, 38, 0.2)); }
      50% { transform: scale(1.04); filter: drop-shadow(0 8px 16px rgba(220, 38, 38, 0.4)); }
      100% { transform: scale(1); filter: drop-shadow(0 2px 4px rgba(220, 38, 38, 0.2)); }
    }

    .progress-container {
      width: 100%; height: 12px; background: #e2e8f0;
      border-radius: 4px; overflow: hidden; margin-bottom: 1rem;
    }
    #progress-bar { 
      width: 0%; height: 100%; background: var(--primary); 
      border-radius: 4px;
    }
    #progress-bar.warning-active { background: var(--danger); }

    .btn-setting { 
      background: #e2e8f0; border: none; color: var(--text-main);
      padding: 6px 14px; border-radius: 4px; font-size: 0.85rem;
      cursor: pointer; margin-bottom: 0.5rem; transition: 0.2s;
      font-family: 'Kanit'; font-weight: 600;
    }

    .action-btn-style {
      width: 100%; border: none; padding: 1.4rem;
      font-size: 2rem; font-weight: 700; border-radius: 8px;
      cursor: pointer; transition: transform 0.1s ease, background-color 0.2s;
      font-family: 'Kanit'; color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .action-btn-style:active { transform: scale(0.97); }

    .btn-start { background: var(--primary); }
    .btn-pause { background: var(--warning); }
    
    .control-grid-bottom {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      margin-top: 12px;
    }
    .btn-bottom-style {
      border: 1px solid #cbd5e1; padding: 0.6rem; border-radius: 6px;
      cursor: pointer; font-family: 'Kanit'; background: white; color: var(--text-sub);
      font-weight: 600; transition: 0.2s; font-size: 0.95rem;
    }
    .btn-bottom-style:hover { background: #f8fafc; }
    .btn-reset-danger:hover { background: #fef2f2; color: var(--danger); border-color: #fca5a5; }

    .footer-credit {
      margin-top: 0.8rem; font-size: 0.85rem; color: var(--text-sub);
      letter-spacing: 1px; font-weight: 400;
    }
    .footer-credit b { color: var(--primary); font-weight: 700; }

    .modal { 
      display: none; position: fixed; inset: 0; 
      background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
      z-index: 1000; justify-content: center; align-items: center; 
    }
    .modal-content { 
      background: white; padding: 2rem; border-radius: 12px;
      width: 90%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      text-align: left;
    }

    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { 
      position: absolute; cursor: pointer; inset: 0; background-color: #cbd5e1; 
      transition: .3s; border-radius: 24px; 
    }
    .slider:before { 
      position: absolute; content: ""; height: 18px; width: 18px; 
      left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; 
    }
    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(20px); }

    #display-team-name { font-size: 1.5rem; font-weight: 700; color: var(--text-main); line-height: 1.2; margin-top: 5px; }
    #display-key { font-size: 0.9rem; font-weight: 700; color: var(--primary); background: #e0f2fe; display: inline-block; padding: 2px 12px; border-radius: 4px; }

    .history-item { 
      border-radius: 6px; margin-bottom: 6px; padding: 12px !important; 
      display: flex; justify-content: space-between; background: #f8fafc; 
      border-left: 5px solid var(--primary) !important; border: 1px solid #e2e8f0;
    }
    #history-list::-webkit-scrollbar { width: 6px; }
    #history-list::-webkit-scrollbar-track { background: #f1f5f9; }
    #history-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* ==========================================
       CUTE ROBOT LOADING ANIMATION CSS
       ========================================== */
    .robot-loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .cute-robot {
      width: 70px; height: 70px;
      background: #0284c7;
      border-radius: 12px;
      position: relative;
      box-shadow: inset 0 -6px 0 rgba(0,0,0,0.15), 0 8px 20px rgba(2, 132, 199, 0.3);
      animation: robotBounce 0.6s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
    }
    /* หูเสาอากาศ */
    .cute-robot::before {
      content: ''; position: absolute;
      width: 6px; height: 12px; background: #006192;
      top: -12px; left: calc(50% - 3px); border-radius: 3px;
    }
    /* ไฟกลมบนเสาอากาศ */
    .cute-robot::after {
      content: ''; position: absolute;
      width: 10px; height: 10px; background: #f59e0b;
      top: -20px; left: calc(50% - 5px); border-radius: 50%;
      animation: lightBlink 0.4s infinite alternate;
    }
    /* หน้าจอและตาหุ่นยนต์ */
    .robot-face {
      width: 52px; height: 32px; background: #0f172a;
      border-radius: 6px; margin: 12px auto 0;
      position: relative; display: flex; justify-content: space-around;
      align-items: center; padding: 0 8px;
    }
    .robot-eye {
      width: 10px; height: 10px; background: #38bdf8; border-radius: 50%;
      box-shadow: 0 0 8px #38bdf8; animation: eyeBlink 2.5s infinite;
    }
    /* ล้อหุ่นยนต์ */
    .robot-wheels {
      display: flex; justify-content: space-between;
      width: 50px; margin: 4px auto 0;
    }
    .wheel {
      width: 14px; height: 8px; background: #475569; border-radius: 4px;
      animation: wheelRoll 0.3s infinite linear;
    }
    /* ข้อความแอนิเมชันด้านล่าง */
    .loading-cute-text {
      font-family: 'Kanit'; font-size: 1rem; color: #334155;
      font-weight: 600; margin-top: 20px; text-align: center;
      min-height: 24px; transition: all 0.3s ease;
    }

    @keyframes robotBounce {
      0% { transform: translateY(0) scaleX(1); }
      100% { transform: translateY(-12px) scaleX(0.96); }
    }
    @keyframes lightBlink {
      0% { opacity: 0.5; background: #ef4444; box-shadow: none; }
      100% { opacity: 1; background: #f59e0b; box-shadow: 0 0 10px #f59e0b; }
    }
    @keyframes eyeBlink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
    @keyframes wheelRoll {
      0% { transform: translateY(0); }
      50% { transform: translateY(2px); }
      100% { transform: translateY(0); }
    }

    @media (min-height: 800px) { .container { height: 740px; } }
  </style>
</head>
<body>

<div class="container">
  <div id="save-zone"></div>

  <div class="header-info">
    <div class="version-tag">WRO 2026 OFFICIAL TIMER | V.2.8.0 CUTE-ANIME</div>
    
    <div id="team-info-display" style="margin-top: 8px; min-height: 85px;">
      <div id="display-key">CHECKING ID</div>
      <div id="display-team-name">กำลังโหลดข้อมูล...</div>
      <div id="display-institution" style="font-size: 0.95rem; color: var(--text-sub); margin-top: 4px; font-weight: 500;">PLEASE WAIT</div>
    </div>
  </div>

  <div>
    <button class="btn-setting" id="settingBtn" onclick="openSettings()">LIMIT: 120.00s ⚙️</button>
    <div class="timer-display" id="display">0.00</div>
    <div class="progress-container"><div id="progress-bar"></div></div>
  </div>

  <div style="width: 100%;">
    <div id="action-controller">
      <button id="actionBtn" class="action-btn-style btn-start" onclick="handleAction()">START</button>
    </div>

    <div class="control-grid-bottom">
      <button class="btn-bottom-style" onclick="showHistory()">HISTORY 📋</button>
      <button class="btn-bottom-style btn-reset-danger" onclick="confirmReset()">RESET 🔄</button>
    </div>

    <div class="footer-credit">CREATE BY <b>GOZAMA</b></div>
  </div>
</div>

  <!-- Modal Settings -->
  <div id="settingModal" class="modal">
    <div class="modal-content">
      <h3 style="margin-top: 0; color: var(--text-main); border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; font-weight: 700;">ตั้งค่านาฬิกา</h3>
      <div class="setting-group" style="margin-top: 15px;">
        <label style="display: block; font-size: 0.9rem; color: var(--text-sub); margin-bottom: 6px; font-weight:600;">เวลาแข่งขัน (วินาที)</label>
        <input type="number" id="setLimit" value="120" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 1rem; outline: none;">
      </div>
      <div style="display: flex; justify-content: space-between; align-items: center; margin: 15px 0;">
        <span style="font-size: 0.95rem; font-weight:600; color: var(--text-main);">นับถอยหลังก่อนเริ่ม (3 วินาที)</span>
        <label class="switch"><input type="checkbox" id="setCountdown"><span class="slider"></span></label>
      </div>
      <div style="border-top: 1px solid #e2e8f0; margin: 15px 0;"></div>
      <div class="setting-group">
        <label style="display: block; font-size: 0.9rem; color: var(--text-sub); margin-bottom: 6px; font-weight:600;">เตือนช่วงท้าย (วินาทีที่เหลือ)</label>
        <input type="number" id="setWarnAt" value="10" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 1rem; outline: none;">
      </div>
      <div style="display: flex; justify-content: space-between; align-items: center; margin: 15px 0;">
        <span style="font-size: 0.95rem; font-weight:600; color: var(--text-main);">เสียงเตือนล่วงหน้า</span>
        <label class="switch"><input type="checkbox" id="setWarning" checked><span class="slider"></span></label>
      </div>
      <button class="btn-start" style="width:100%; margin-top:10px; padding:12px; font-size: 1.1rem; border-radius: 6px; border:none; color:white; font-weight:700; cursor:pointer;" onclick="saveSettings()">บันทึกการตั้งค่า</button>
      <button class="btn-bottom-style" style="width: 100%; margin-top: 8px; background: #64748b; color: white;" onclick="document.getElementById('settingModal').style.display='none'">ยกเลิก</button>
    </div>
  </div>

  <!-- Modal History -->
  <div id="history-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()" style="max-width: 450px;">
      <h3 style="margin-top: 0; margin-bottom:15px; color: var(--text-main); font-weight: 700;">ประวัติการบันทึก (เครื่องนี้)</h3>
      <div id="history-list" style="max-height: 45vh; overflow-y: auto; padding-right: 5px;"></div>
      <button class="btn-bottom-style" style="width: 100%; margin-top: 20px; background: #64748b; color: white;" onclick="document.getElementById('history-modal').style.display='none'">ปิดหน้าต่าง</button>
    </div>
  </div>

  <script>
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-5W0x3pSIlwE-vCUNOai_mJzQaEZ3gRLhsddK67Dwv3qVWO6qK-qu7U2CGWMUCRe-sQ/exec"; 

    let globalRowKey = ""; 
    let CONFIG = {
      limit: parseFloat(localStorage.getItem('cfg_limit')) || 120,
      useCountdown: localStorage.getItem('cfg_useCountdown') === 'true',
      useWarning: localStorage.getItem('cfg_useWarning') !== 'false',
      warnAt: parseFloat(localStorage.getItem('cfg_warnAt')) || 10
    };
    
    let state = "IDLE"; 
    let startTime, elapsedTime = 0, timerInterval = null, countdownInt = null;
    let lastBeepSecond = -1;
    let textRotationInterval = null;

    let myDeviceID = localStorage.getItem('timer_device_id');
    if (!myDeviceID) {
      myDeviceID = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
      localStorage.setItem('timer_device_id', myDeviceID);
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playBeep(freq = 880, dur = 0.1) {
      try {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine"; 
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
      } catch (e) { console.error("Audio error:", e); }
    }

    function unlockIOSAudio() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const buffer = audioCtx.createBuffer(1, 1, 22050);
      const source = audioCtx.createBufferSource();
      source.buffer = buffer; source.connect(audioCtx.destination);
      source.start(0);
    }

    function setControlsEnabled(enabled) {
      document.getElementById('settingBtn').disabled = !enabled;
    }

    function directClose() {
      window.open('', '_self', ''); window.close(); 
      if (navigator.app && navigator.app.exitApp) navigator.app.exitApp();
      setTimeout(() => {
        const fallbackUrl = "https://www.appsheet.com/start/4a35a640-88de-4af9-900f-2f08fb713f0a";
        try { window.top.location.href = fallbackUrl; } catch(e) { window.location.href = fallbackUrl; }
      }, 200);
    }

    // ==========================================
    // HYBRID CORE ENGINE
    // ==========================================
    const isGoogleEnv = (typeof google !== 'undefined' && google.script && google.script.run);

    function callBackend(action, params, callback) {
      if (isGoogleEnv) {
        if (action === 'getTeamInfo') {
          google.script.run.withSuccessHandler(callback).getTeamInfo(params.rowKey);
        } else if (action === 'saveTime') {
          google.script.run.withSuccessHandler(callback).saveTime(params.timeStr, params.deviceID, params.rowKey);
        } else if (action === 'getHistory') {
          google.script.run.withSuccessHandler(callback).getHistory(params.deviceID);
        }
      } else {
        let url = `${GAS_WEB_APP_URL}?action=${action}`;
        for (let key in params) { url += `&${key}=${encodeURIComponent(params[key])}`; }
        fetch(url)
          .then(res => res.json())
          .then(data => callback(data))
          .catch(err => {
            console.error("API Error:", err);
            Swal.fire('Error', 'การเชื่อมต่อฐานข้อมูลล้มเหลว', 'error');
            if(action === 'getTeamInfo') callback(null);
          });
      }
    }

    function getURLParameters(callback) {
      if (isGoogleEnv) {
        google.script.url.getLocation(function(location) {
          let key = location.parameter.rowKey || (location.parameters && location.parameters.rowKey ? location.parameters.rowKey[0] : "");
          callback(key);
        });
      } else {
        const urlParams = new URLSearchParams(window.location.search);
        callback(urlParams.get('rowKey') || "");
      }
    }

    // ==========================================
    // STATE MACHINE & CONTROLLER RENDERING
    // ==========================================
    function renderButtonUI() {
      const mainController = document.getElementById('action-controller');
      const saveZone = document.getElementById('save-zone');
      
      if (state === "IDLE") {
        mainController.innerHTML = `<button id="actionBtn" class="action-btn-style btn-start" onclick="handleAction()">START</button>`;
        saveZone.innerHTML = "";
      } 
      else if (state === "COUNTING") {
        mainController.innerHTML = `<button id="actionBtn" class="action-btn-style btn-start" style="opacity: 0.5; cursor: not-allowed;" disabled>COUNTDOWN</button>`;
        saveZone.innerHTML = "";
      } 
      else if (state === "RUNNING") {
        mainController.innerHTML = `<button id="actionBtn" class="action-btn-style btn-pause" onclick="pauseRunning()">PAUSE / STOP</button>`;
        saveZone.innerHTML = "";
      } 
      else if (state === "PAUSED") {
        mainController.innerHTML = `<button id="actionBtn" class="action-btn-style btn-start" onclick="resumeRunning()">RESUME</button>`;
        saveZone.innerHTML = `<button class="btn-save-top" onclick="confirmSave()">💾 SAVE RESULT</button>`;
      } 
      else if (state === "FINISHED") {
        mainController.innerHTML = `<button id="actionBtn" class="action-btn-style btn-start" style="opacity: 0.4; cursor:not-allowed;" disabled>TIME OVER</button>`;
        saveZone.innerHTML = `<button class="btn-save-top" onclick="confirmSave()">💾 SAVE RESULT</button>`;
      }
    }

    function handleAction() {
      if (state === "IDLE") {
        unlockIOSAudio();
        if (CONFIG.useCountdown) {
          startCountdown();
        } else {
          startRunning();
        }
      }
    }

    function startCountdown() {
      state = "COUNTING";
      renderButtonUI();
      setControlsEnabled(false);
      
      const display = document.getElementById('display');
      display.classList.add('counting');
      
      let lastTriggeredSecond = -1;
      const countdownDuration = 3000;
      const countdownStart = Date.now();

      countdownInt = setInterval(() => {
        const timePassed = Date.now() - countdownStart;
        const timeLeft = countdownDuration - timePassed;
        const currentCount = Math.ceil(timeLeft / 1000);

        if (timeLeft > 0) {
          if (currentCount !== lastTriggeredSecond) {
            display.innerText = currentCount;
            playBeep(440, 0.1);
            lastTriggeredSecond = currentCount;
          }
        } else {
          clearInterval(countdownInt);
          countdownInt = null;
          display.classList.remove('counting');
          playBeep(880, 0.3);
          startRunning();
        }
      }, 16);

      display.innerText = "3";
      playBeep(440, 0.1);
      lastTriggeredSecond = 3;
    }

    function startRunning() {
      state = "RUNNING";
      renderButtonUI();
      setControlsEnabled(false);
      startTime = Date.now() - elapsedTime;
      timerInterval = setInterval(update, 10);
    }

    function pauseRunning() {
      if (state === "RUNNING") {
        clearInterval(timerInterval);
        timerInterval = null;
        state = "PAUSED";
        setControlsEnabled(true);
        renderButtonUI();
        displayTime(elapsedTime);
      }
    }

    function resumeRunning() {
      if (state === "PAUSED") {
        state = "RUNNING";
        renderButtonUI();
        setControlsEnabled(false);
        startTime = Date.now() - elapsedTime;
        timerInterval = setInterval(update, 10);
      }
    }

    function update() {
      const now = Date.now();
      elapsedTime = now - startTime;
      const limitMs = CONFIG.limit * 1000;
      
      if (elapsedTime >= limitMs) { 
        elapsedTime = limitMs; 
        clearInterval(timerInterval);
        timerInterval = null;
        state = "FINISHED";
        renderButtonUI();
        setControlsEnabled(true);
        playBeep(440, 0.5); 
        displayTime(elapsedTime);
        return;
      }
      
      const currentSec = Math.floor(elapsedTime / 1000);
      const remainSec = CONFIG.limit - currentSec;
      const display = document.getElementById('display');
      const progressBar = document.getElementById('progress-bar');
      
      if (CONFIG.useWarning && remainSec <= CONFIG.warnAt && state === "RUNNING") {
        display.classList.add('warning-active');
        progressBar.classList.add('warning-active');
        if (currentSec !== lastBeepSecond && elapsedTime < limitMs) {
          playBeep(880, 0.1);
          lastBeepSecond = currentSec;
        }
      } else {
        display.classList.remove('warning-active');
        progressBar.classList.remove('warning-active');
      }
      displayTime(elapsedTime);
    }

    function displayTime(ms) {
      document.getElementById('display').innerText = (ms / 1000).toFixed(2);
      const percentage = (ms / (CONFIG.limit * 1000)) * 100;
      document.getElementById('progress-bar').style.width = Math.min(percentage, 100) + "%";
    }

    function reset() {
      if (timerInterval) clearInterval(timerInterval);
      if (countdownInt) clearInterval(countdownInt);
      timerInterval = null;
      countdownInt = null;
      
      state = "IDLE";
      elapsedTime = 0;
      lastBeepSecond = -1;
      
      setControlsEnabled(true);
      renderButtonUI();
      displayTime(0);
      
      document.getElementById('display').classList.remove('warning-active', 'counting');
      document.getElementById('progress-bar').classList.remove('warning-active');
    }

    function confirmSave() {
      const timeStr = (elapsedTime / 1000).toFixed(2);
      Swal.fire({
        title: 'บันทึกเวลาแข่งขัน?',
        text: `เวลาทีมชิ้นนี้คือ: ${timeStr} วินาที`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#16a34a',
        confirmButtonText: 'ใช่, บันทึกเลย',
        cancelButtonText: 'ยกเลิก'
      }).then((result) => { if (result.isConfirmed) saveToSheet(timeStr); });
    }

    // ==========================================
    // ANIMATED LOADING LOGIC FOR SAVE PROCESS
    // ==========================================
    function saveToSheet(timeStr) {
      if (!globalRowKey) { 
        Swal.fire('Error', 'ไม่พบข้อมูล ID ทีมใน URL ลิงก์', 'error');
        return; 
      }
      
      const loadingTexts = [
        "กำลังพาหุ่นยนต์ไปส่งคะแนน...",
        "ตรวจสอบล้อและเซนเซอร์...",
        "กำลังบันทึกลง Google Sheets...",
        "อัปโหลดข้อมูลเข้าคลาวด์...",
        "รอสัญญาณตอบกลับจากบอร์ด..."
      ];
      
      // เรียกหน้าต่างโหลดดิ้งรูปแบบหุ่นยนต์ดุ๊กดิ๊กแบบ CSS เพียว
      Swal.fire({
        html: `
          <div class="robot-loading-container">
            <div class="cute-robot">
              <div class="robot-face">
                <div class="robot-eye"></div>
                <div class="robot-eye"></div>
              </div>
            </div>
            <div class="robot-wheels">
              <div class="wheel"></div>
              <div class="wheel"></div>
            </div>
            <div id="cute-loading-msg" class="loading-cute-text">${loadingTexts[0]}</div>
          </div>
        `,
        showConfirmButton: false,
        allowOutsideClick: false,
        allowEscapeKey: false,
        didOpen: () => {
          let textIdx = 1;
          textRotationInterval = setInterval(() => {
            const textEl = document.getElementById('cute-loading-msg');
            if (textEl) {
              textEl.style.opacity = 0;
              setTimeout(() => {
                textEl.innerText = loadingTexts[textIdx % loadingTexts.length];
                textEl.style.opacity = 1;
                textIdx++;
              }, 150);
            }
          }, 1500);
        },
        willClose: () => {
          if (textRotationInterval) clearInterval(textRotationInterval);
        }
      });
      
      callBackend('saveTime', { timeStr: timeStr, deviceID: myDeviceID, rowKey: globalRowKey }, function(res) {
        Swal.close(); 
        if(res && res.success) {
          Swal.fire({ 
            icon: 'success',
            title: 'บันทึกสำเร็จ!',
            text: `ส่งผลการจับเวลา ${timeStr} วินาที เรียบร้อย`,
            allowOutsideClick: false,
            allowEscapeKey: false,
            confirmButtonColor: '#dc2626',
            confirmButtonText: '❌ ปิดหน้าจอกลับสู่ AppSheet'
          }).then((result) => { if (result.isConfirmed) { directClose(); } });
        } else {
          Swal.fire('เกิดข้อผิดพลาด', res ? res.error : 'ไม่สามารถส่งข้อมูลได้', 'error');
        }
      });
    }

    function confirmReset() {
      Swal.fire({ title: 'Reset เวลา?', text: 'กระบวนการนี้จะล้างเวลาปัจจุบันทิ้งทั้งหมด', icon: 'warning', showCancelButton: true, confirmButtonColor: '#dc2626', confirmButtonText: 'ใช่, รีเซ็ต' })
      .then((result) => { if (result.isConfirmed) reset(); });
    }

    function openSettings() { 
      document.getElementById('setLimit').value = CONFIG.limit;
      document.getElementById('setCountdown').checked = CONFIG.useCountdown;
      document.getElementById('setWarning').checked = CONFIG.useWarning;
      document.getElementById('setWarnAt').value = CONFIG.warnAt;
      document.getElementById('settingModal').style.display = 'flex'; 
    }
    
    function saveSettings() {
      CONFIG.limit = parseFloat(document.getElementById('setLimit').value) || 120;
      CONFIG.useCountdown = document.getElementById('setCountdown').checked;
      CONFIG.useWarning = document.getElementById('setWarning').checked;
      CONFIG.warnAt = parseFloat(document.getElementById('setWarnAt').value) || 10;
      
      localStorage.setItem('cfg_limit', CONFIG.limit);
      localStorage.setItem('cfg_useCountdown', CONFIG.useCountdown);
      localStorage.setItem('cfg_useWarning', CONFIG.useWarning);
      localStorage.setItem('cfg_warnAt', CONFIG.warnAt);

      document.getElementById('settingBtn').innerText = `LIMIT: ${CONFIG.limit.toFixed(2)}s ⚙️`;
      document.getElementById('settingModal').style.display = 'none';
      reset();
    }

    function showHistory() {
      document.getElementById('history-modal').style.display = 'flex';
      loadHistoryData();
    }

    function loadHistoryData() {
      const list = document.getElementById('history-list');
      list.innerHTML = `<div style="padding:20px; opacity:0.5; text-align:center;">กำลังโหลดประวัติ...</div>`;
      
      callBackend('getHistory', { deviceID: myDeviceID }, function(data) {
        if (!data || data.length === 0) {
          list.innerHTML = `<div style="padding:20px; opacity:0.5; text-align:center;">ไม่มีประวัติการบันทึกของเครื่องนี้</div>`;
          return;
        }
        list.innerHTML = data.map(item => `
          <div class="history-item">
            <div style="text-align:left">
              <div style="font-size:0.9rem; color:var(--text-sub); font-weight:600;">
                ${item.date} | <span style="color:var(--primary); font-weight:bold;">ID: ${item.team}</span>
              </div>
            </div>
            <b style="font-size:1.25rem; align-self:center; color:var(--text-main)">${item.time}s</b>
          </div>
        `).join('');
      });
    }

    function loadTeamInfo(rowKey) {
      callBackend('getTeamInfo', { rowKey: rowKey }, function(info) {
        if (info) {
          document.getElementById('display-key').innerText = "TEAM ID: " + info.key;
          document.getElementById('display-team-name').innerText = info.teamName || "ไม่พบชื่อทีม";
          document.getElementById('display-institution').innerText = info.institution || "-";
        } else {
          document.getElementById('display-team-name').innerText = "ไม่พบ ID นี้ในระบบ";
          document.getElementById('display-institution').innerText = "โปรดตรวจสอบฐานข้อมูลชีต";
          document.getElementById('display-key').innerText = "ID: " + rowKey;
        }
      });
    }

    window.onload = function() {
      document.getElementById('settingBtn').innerText = `LIMIT: ${CONFIG.limit.toFixed(2)}s ⚙️`;
      
      document.addEventListener('touchstart', unlockIOSAudio, { once: true });
      document.addEventListener('click', unlockIOSAudio, { once: true });

      getURLParameters(function(rowKey) {
        globalRowKey = rowKey;
        if (globalRowKey) {
          loadTeamInfo(globalRowKey);
        } else {
          document.getElementById('display-team-name').innerText = "LAP TIMER PRO";
          document.getElementById('display-institution').innerText = "READY TO START (NO PARAMETER)";
          document.getElementById('display-key').innerText = "NO ID DETECTED";
        }
      });
    };
  </script>
</body>
</html>
