<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WRO LAP TIMER PRO</title>
  <!-- Google Fonts & SweetAlert2 -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --primary: #0ea5e9;
      --success: #10b981;
      --danger: #f43f5e;
      --text-main: #1e293b;
      --text-sub: #64748b;
      --glow: rgba(14, 165, 233, 0.2);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Kanit', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: ""; position: absolute; width: 300px; height: 300px;
      background: var(--primary); filter: blur(150px); opacity: 0.1;
      top: -100px; right: -100px; z-index: -1;
    }

    .container {
      width: 95%;
      max-width: 500px;
      height: 90vh;
      background: var(--card);
      padding: 2.5rem 2rem 2rem 2rem;
      border-radius: 3rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.05);
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      border: 1px solid rgba(255,255,255,0.8);
    }

    .header-info { margin-top: 0.5rem; }
    .version-tag { font-size: 0.7rem; color: var(--text-sub); opacity: 0.6; letter-spacing: 1px; }

    .timer-display {
      font-size: clamp(5rem, 20vw, 8rem);
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-main);
      margin: 1rem 0;
      transition: all 0.3s ease;
      text-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }
    
    .timer-display.counting { color: var(--primary); text-shadow: 0 0 30px var(--glow); }
    .timer-display.warning-active { color: var(--danger); text-shadow: 0 0 30px rgba(244, 63, 94, 0.3); }

    .progress-container {
      width: 100%; height: 8px; background: #f1f5f9;
      border-radius: 10px; overflow: hidden; margin-bottom: 2rem;
    }
    #progress-bar { 
      width: 0%; height: 100%; background: var(--primary); 
      transition: width 0.1s linear; border-radius: 10px;
      box-shadow: 0 0 10px var(--glow);
    }

    .btn-setting { 
      background: #f1f5f9; border: none; color: var(--text-sub);
      padding: 8px 20px; border-radius: 30px; font-size: 0.8rem;
      cursor: pointer; margin-bottom: 1rem; transition: 0.3s;
      font-family: 'Kanit'; font-weight: 500;
    }

    #actionBtn {
      width: 100%; border: none; padding: 1.8rem;
      font-size: 1.8rem; font-weight: 700; border-radius: 2rem;
      cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-family: 'Kanit'; color: white; margin-bottom: 1rem;
    }

    .btn-start { background: var(--primary); box-shadow: 0 15px 30px var(--glow); }
    .btn-stop { background: var(--danger); box-shadow: 0 15px 30px rgba(244, 63, 94, 0.3); }
    .btn-save-mode { background: var(--success); box-shadow: 0 15px 30px rgba(16, 185, 129, 0.3); }
    
    #actionBtn:active { transform: scale(0.95); }

    .secondary-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
    .btn-sub { 
      border: 1px solid #e2e8f0; padding: 1rem; border-radius: 1.2rem;
      cursor: pointer; font-family: 'Kanit'; background: white; color: var(--text-sub);
      font-weight: 500; transition: 0.3s;
    }
    .btn-sub:hover { background: #f8fafc; color: var(--primary); border-color: var(--primary); }

    .footer-credit {
      margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-sub);
      letter-spacing: 2px; font-weight: 300;
    }
    .footer-credit b { color: var(--primary); font-weight: 500; }

    .modal { 
      display: none; position: fixed; inset: 0; 
      background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
      z-index: 1000; justify-content: center; align-items: center; 
    }
    .modal-content { 
      background: white; padding: 2.5rem; border-radius: 2.5rem; 
      width: 90%; max-width: 400px; box-shadow: 0 30px 60px rgba(0,0,0,0.1);
      border: 1px solid #f1f5f9;
    }

    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { 
      position: absolute; cursor: pointer; inset: 0; background-color: #e2e8f0; 
      transition: .4s; border-radius: 24px; 
    }
    .slider:before { 
      position: absolute; content: ""; height: 18px; width: 18px; 
      left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; 
    }
    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(20px); }

    #display-team-name { text-transform: uppercase; text-shadow: 0 0 15px rgba(14, 165, 233, 0.1); }
    
    .history-item { 
      transition: 0.2s; border-radius: 12px; margin-bottom: 5px; padding: 10px !important; 
      display: flex; justify-content: space-between; background: rgba(14, 165, 233, 0.05); 
      border-left: 4px solid var(--primary) !important;
    }
    .history-item:hover { background: #f8fafc; }
    #history-list::-webkit-scrollbar { width: 4px; }
    #history-list::-webkit-scrollbar-track { background: #f1f5f9; }
    #history-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    @media (min-height: 800px) { .container { height: 750px; } }
    @media (max-width: 480px) {
      .header-info { margin-top: 0.5rem; }
      #display-team-name { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header-info">
    <div class="version-tag">SYSTEM VERSION 2.5.9 PRO</div>
    <div id="team-info-display" style="margin-top: 15px; min-height: 80px;">
      <div id="display-team-name" style="font-size: 1.4rem; font-weight: 700; color: var(--primary); line-height: 1.2;">กำลังโหลดข้อมูล...</div>
      <div id="display-institution" style="font-size: 0.9rem; color: var(--text-sub); margin-top: 4px; letter-spacing: 0.5px;">PLEASE WAIT</div>
      <div id="display-key" style="font-size: 0.7rem; color: #cbd5e1; margin-top: 5px;">CHECKING ID</div>
    </div>
  </div>

  <div>
    <button class="btn-setting" id="settingBtn" onclick="openSettings()">LIMIT: 120.00s ⚙️</button>
    <div class="timer-display" id="display">0.00</div>
    <div class="progress-container"><div id="progress-bar"></div></div>
  </div>

  <div style="width: 100%;">
    <button id="actionBtn" class="btn-start" onclick="handleAction()">START</button>
    <div class="secondary-controls">
      <button class="btn-sub" onclick="confirmReset()">RESET</button>
      <button class="btn-sub" onclick="showHistory()">HISTORY</button>
    </div>
    <div class="footer-credit">CREATE BY <b>GOZAMA</b></div>
  </div>
</div>

  <!-- Modal Settings -->
  <div id="settingModal" class="modal">
    <div class="modal-content">
      <h3 style="margin-top: 0; color: var(--text-main); border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; font-weight: 700;">ตั้งค่านาฬิกา</h3>
      
      <div class="setting-group" style="text-align: left; margin-top: 20px;">
        <label style="display: block; font-size: 0.85rem; color: var(--text-sub); margin-bottom: 8px;">เวลาแข่งขัน (วินาที)</label>
        <input type="number" id="setLimit" value="120" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 1rem; outline: none;">
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0;">
        <span style="font-size: 0.95rem; color: var(--text-main);">นับถอยหลังก่อนเริ่ม</span>
        <label class="switch"><input type="checkbox" id="setCountdown"><span class="slider"></span></label>
      </div>

      <div style="border-top: 2px solid #f1f5f9; margin: 20px 0;"></div>
      
      <div class="setting-group" style="text-align: left;">
        <label style="display: block; font-size: 0.85rem; color: var(--text-sub); margin-bottom: 8px;">เตือนช่วงท้าย (วินาทีที่เหลือ)</label>
        <input type="number" id="setWarnAt" value="10" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 1rem; outline: none;">
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0;">
        <span style="font-size: 0.95rem; color: var(--text-main);">เสียงเตือนล่วงหน้า</span>
        <label class="switch"><input type="checkbox" id="setWarning" checked><span class="slider"></span></label>
      </div>

      <button class="btn-start" style="width:100%; margin-top:10px; padding:15px; font-size: 1.1rem; border-radius: 15px;" onclick="saveSettings()">บันทึกการตั้งค่า</button>
      <button class="btn-sub" style="width: 100%; margin-top: 10px; border: none;" onclick="document.getElementById('settingModal').style.display='none'">ยกเลิก</button>
    </div>
  </div>

  <!-- Modal History -->
  <div id="history-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()" style="max-width: 450px;">
      <h3 style="margin-top: 0; margin-bottom:20px; color: var(--text-main); font-weight: 700;">ประวัติการบันทึก (เครื่องนี้)</h3>
      <div id="history-list" style="max-height: 45vh; overflow-y: auto; padding-right: 5px;"></div>
      <button class="btn-sub" style="width: 100%; margin-top: 25px; padding: 12px; background: var(--text-main); color: white; border-radius: 15px;" onclick="document.getElementById('history-modal').style.display='none'">ปิดหน้าต่าง</button>
    </div>
  </div>

  <script>
    // 🌟 นำลิงก์ Web App URL หลังจากกด Deploy ของคุณมาวางแทนตรงนี้เพื่ออ้างอิงตอนเปิดบน GitHub ครับ
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-5W0x3pSIlwE-vCUNOai_mJzQaEZ3gRLhsddK67Dwv3qVWO6qK-qu7U2CGWMUCRe-sQ/exec";

    // 🌟 [0] GLOBAL VARIABLES
    let globalRowKey = ""; 
    const isGitHubMode = window.location.hostname !== "script.google.com"; // เช็คแพลตฟอร์ม

    // [1] CONFIG & VARIABLES
    let CONFIG = {
      limit: parseFloat(localStorage.getItem('cfg_limit')) || 120,
      useCountdown: localStorage.getItem('cfg_useCountdown') === 'true',
      useWarning: localStorage.getItem('cfg_useWarning') !== 'false',
      warnAt: parseFloat(localStorage.getItem('cfg_warnAt')) || 10
    };
    
    let state = "IDLE"; 
    let startTime, elapsedTime = 0, timerInterval = null, countdownInt = null;
    let lastBeepSecond = -1;
    let isCountingDown = false;

    // [2] INITIALIZE DEVICE ID
    let myDeviceID = localStorage.getItem('timer_device_id');
    if (!myDeviceID) {
      myDeviceID = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
      localStorage.setItem('timer_device_id', myDeviceID);
    }

    // ฟังก์ชันช่วยจัดการเรียก API แบบ Hybrid (หัวใจสำคัญในการต่อ GitHub)
    function callServer(action, params, successCallback, errorCallback) {
      if (!isGitHubMode) {
        // หากเปิดผ่าน Google Web App ตรงๆ ให้ใช้สะพานเดิมเพื่อความเร็วสูงสุด
        if (action === "getTeamInfo") {
          google.script.run.withSuccessHandler(successCallback).getTeamInfo(params.rowKey);
        } else if (action === "saveTime") {
          google.script.run.withSuccessHandler(successCallback).saveTime(params.timeStr, params.deviceID, params.rowKey);
        } else if (action === "getHistory") {
          google.script.run.withSuccessHandler(successCallback).getHistory(params.deviceID);
        }
      } else {
        // หากเปิดใช้งานอยู่บน GitHub Pages ให้ทำภารกิจผ่าน Fetch API ส่งข้อมูลข้ามเครือข่ายแทน
        let queryParams = `?action=${action}`;
        for (let key in params) {
          queryParams += `&${key}=${encodeURIComponent(params[key])}`;
        }
        
        fetch(GAS_WEB_APP_URL + queryParams)
          .then(response => response.json())
          .then(data => successCallback(data))
          .catch(err => {
            if (errorCallback) errorCallback(err);
            console.error("API Error:", err);
          });
      }
    }

    // [3] UTILITIES & SOUNDS
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playBeep(freq = 880, dur = 0.1) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine"; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function setControlsEnabled(enabled) {
      const isDisable = !enabled;
      document.getElementById('settingBtn').disabled = isDisable;
      document.querySelectorAll('.btn-sub').forEach(btn => btn.disabled = isDisable);
    }

    function directClose() {
      window.open('', '_self', ''); 
      window.close(); 
      if (navigator.app && navigator.app.exitApp) navigator.app.exitApp();
      
      setTimeout(() => {
        if (!window.closed) {
          window.location.href = "https://www.appsheet.com/start/4a35a640-88de-4af9-900f-2f08fb713f0a";
        }
      }, 100);
    }

    // [4] CORE TIMER LOGIC
    function handleAction() {
      if (state === "IDLE") {
        if (CONFIG.useCountdown) startCountdown(); else startRunning();
      } else if (state === "RUNNING") {
        stopRunning();
      } else if (state === "FINISHED") {
        confirmSave();
      }
    }

    function startCountdown() {
      state = "COUNTING";
      isCountingDown = true;
      let count = 3;
      setControlsEnabled(false);
      const btn = document.getElementById('actionBtn');
      const display = document.getElementById('display');
      btn.disabled = true; btn.style.opacity = "0.5";
      display.classList.add('counting');
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      countdownInt = setInterval(() => {
        if (count > 0) { 
          display.innerText = count; playBeep(440); count--; 
        } else { 
          clearInterval(countdownInt); countdownInt = null;
          display.classList.remove('counting'); playBeep(880, 0.3);
          isCountingDown = false; startRunning(); 
        }
      }, 1000);
      display.innerText = count; playBeep(440); count--;
    }

    function startRunning() {
      state = "RUNNING";
      setControlsEnabled(false);
      const btn = document.getElementById('actionBtn');
      btn.disabled = false; btn.style.opacity = "1";
      btn.innerText = "STOP"; btn.className = "btn-stop";
      startTime = Date.now() - elapsedTime;
      timerInterval = setInterval(update, 10);
    }

    function stopRunning() {
      state = "FINISHED";
      clearInterval(timerInterval); timerInterval = null;
      setControlsEnabled(true);
      const btn = document.getElementById('actionBtn');
      btn.innerText = "SAVE RESULT"; btn.className = "btn-save-mode";
    }

    function update() {
      const now = Date.now();
      elapsedTime = now - startTime;
      const limitMs = CONFIG.limit * 1000;
      if (elapsedTime >= limitMs) { elapsedTime = limitMs; stopRunning(); playBeep(440, 0.5); }
      
      const currentSec = Math.floor(elapsedTime / 1000);
      const remainSec = CONFIG.limit - currentSec;
      const display = document.getElementById('display');
      const progressBar = document.getElementById('progress-bar');
      
      if (CONFIG.useWarning && remainSec <= CONFIG.warnAt && state === "RUNNING") {
        display.classList.add('warning-active');
        progressBar.classList.add('warning-active');
        if (currentSec !== lastBeepSecond && elapsedTime < limitMs) {
          playBeep(880, 0.1); lastBeepSecond = currentSec;
        }
      } else {
        display.classList.remove('warning-active');
        progressBar.classList.remove('warning-active');
      }
      displayTime(elapsedTime);
    }

    function displayTime(ms) {
      document.getElementById('display').innerText = (ms / 1000).toFixed(2);
      document.getElementById('progress-bar').style.width = (ms / (CONFIG.limit * 1000)) * 100 + "%";
    }

    function reset() {
      state = "IDLE";
      clearInterval(timerInterval); clearInterval(countdownInt);
      timerInterval = null; countdownInt = null;
      setControlsEnabled(true);
      elapsedTime = 0; lastBeepSecond = -1; isCountingDown = false;
      const btn = document.getElementById('actionBtn');
      btn.innerText = "START"; btn.className = "btn-start"; btn.disabled = false; btn.style.opacity = "1";
      displayTime(0);
      document.getElementById('display').classList.remove('warning-active', 'counting');
    }

    // [5] DATA OPERATIONS & CONFIRMATION
    function confirmSave() {
      const timeStr = (elapsedTime / 1000).toFixed(2);
      Swal.fire({
        title: 'บันทึกเวลา?',
        text: `เวลาที่จับได้: ${timeStr} วินาที`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#0ea5e9',
        confirmButtonText: 'บันทึก',
        cancelButtonText: 'ยกเลิก'
      }).then((result) => { if (result.isConfirmed) saveToSheet(timeStr); });
    }

    function saveToSheet(timeStr) {
      const btn = document.getElementById('actionBtn');
      
      if (!globalRowKey) { 
        Swal.fire('Error', 'ไม่พบข้อมูล ID ใน URL Link (โปรดเปิดลิงก์ผ่าน AppSheet)', 'error'); 
        return; 
      }
      
      btn.innerText = "SAVING..."; btn.disabled = true;

      callServer("saveTime", {
        timeStr: timeStr,
        deviceID: myDeviceID,
        rowKey: globalRowKey
      }, (res) => {
        if(res && res.success) {
          Swal.fire({ 
            icon: 'success', 
            title: 'บันทึกสำเร็จ!', 
            text: `บันทึกเวลา ${timeStr} วินาที เรียบร้อยแล้ว`, 
            allowOutsideClick: false,
            allowEscapeKey: false,
            confirmButtonColor: '#f43f5e',
            confirmButtonText: '❌ ปิด Tab นี้เพื่อกลับสู่ AppSheet'
          }).then((result) => {
            if (result.isConfirmed) { directClose(); }
          });
        } else {
          Swal.fire('เกิดข้อผิดพลาด', (res && res.error) ? res.error : "ไม่สามารถบันทึกได้", 'error');
          btn.innerText = "SAVE RESULT"; btn.disabled = false;
        }
      }, () => {
        Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเครือข่ายไปยังคลาวด์ได้', 'error');
        btn.innerText = "SAVE RESULT"; btn.disabled = false;
      });
    }

    function confirmReset() {
      Swal.fire({ title: 'Reset?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#f43f5e', confirmButtonText: 'ใช่' })
      .then((result) => { if (result.isConfirmed) reset(); });
    }

    function openSettings() { 
      document.getElementById('setLimit').value = CONFIG.limit;
      document.getElementById('setCountdown').checked = CONFIG.useCountdown;
      document.getElementById('setWarning').checked = CONFIG.useWarning;
      document.getElementById('setWarnAt').value = CONFIG.warnAt;
      document.getElementById('settingModal').style.display = 'flex'; 
    }
    
    function saveSettings() {
      CONFIG.limit = parseFloat(document.getElementById('setLimit').value) || 120;
      CONFIG.useCountdown = document.getElementById('setCountdown').checked;
      CONFIG.useWarning = document.getElementById('setWarning').checked;
      CONFIG.warnAt = parseFloat(document.getElementById('setWarnAt').value) || 10;
      
      localStorage.setItem('cfg_limit', CONFIG.limit);
      localStorage.setItem('cfg_useCountdown', CONFIG.useCountdown);
      localStorage.setItem('cfg_useWarning', CONFIG.useWarning);
      localStorage.setItem('cfg_warnAt', CONFIG.warnAt);

      document.getElementById('settingBtn').innerText = `LIMIT: ${CONFIG.limit.toFixed(2)}s ⚙️`;
      document.getElementById('settingModal').style.display = 'none';
      reset();
    }

    function showHistory() {
      document.getElementById('history-modal').style.display = 'flex';
      loadHistoryData();
    }

    function loadHistoryData() {
      const list = document.getElementById('history-list');
      list.innerHTML = `<div style="padding:20px; opacity:0.5; text-align:center;">กำลังโหลดประวัติ...</div>`;
      
      callServer("getHistory", { deviceID: myDeviceID }, (data) => {
        if (!data || data.length === 0) {
          list.innerHTML = `<div style="padding:20px; opacity:0.5; text-align:center;">ไม่มีประวัติการบันทึกของเครื่องนี้</div>`;
          return;
        }
        list.innerHTML = data.map(item => `
          <div class="history-item">
            <div style="text-align:left">
              <div style="font-size:0.85rem; color:var(--text-sub);">
                ${item.date} | <span style="color:var(--primary); font-weight:bold;">ID: ${item.team}</span>
              </div>
            </div>
            <b style="font-size:1.2rem; align-self:center; color:var(--text-main)">${item.time}s</b>
          </div>
        `).join('');
      });
    }

    // [6] TEAM INFO FETCH FUNCTION
    function loadTeamInfo(rowKey) {
      callServer("getTeamInfo", { rowKey: rowKey }, function(info) {
        if (info) {
          document.getElementById('display-key').innerText = "ID: " + info.key;
          document.getElementById('display-team-name').innerText = info.teamName || "ไม่พบชื่อทีม";
          document.getElementById('display-institution').innerText = info.institution || "-";
        } else {
          document.getElementById('display-team-name').innerText = "ไม่พบ ID นี้ในระบบ";
          document.getElementById('display-institution').innerText = "โปรดตรวจสอบข้อมูลใน Sheet";
          document.getElementById('display-key').innerText = "ID: " + rowKey;
        }
      });
    }

    // 🌟 [7] INITIALIZATION ON LOAD (ระบบสลับตัวอ่าน Parameter อัตโนมัติระหว่างสองแพลตฟอร์ม)
    window.onload = function() {
      document.getElementById('settingBtn').innerText = `LIMIT: ${CONFIG.limit.toFixed(2)}s ⚙️`;
      
      if (!isGitHubMode) {
        // หากทำงานอยู่ฝั่ง Google Apps Script ใช้ฟังก์ชันเนทีฟดึงค่าจาก URL
        google.script.url.getLocation(function(location) {
          globalRowKey = location.parameter.rowKey || (location.parameters.rowKey && location.parameters.rowKey[0]) || "";
          initWorkflow();
        });
      } else {
        // หากรันอยู่บน GitHub Pages สกัดดึงพารามิเตอร์โดยตรงผ่าน JavaScript Browser
        const urlSearchParams = new URLSearchParams(window.location.search);
        globalRowKey = urlSearchParams.get('rowKey') || "";
        initWorkflow();
      }
    };

    function initWorkflow() {
      if (globalRowKey) {
        loadTeamInfo(globalRowKey); 
      } else {
        document.getElementById('display-team-name').innerText = "LAP TIMER PRO";
        document.getElementById('display-institution').innerText = "READY TO START (NO PARAMETER)";
        document.getElementById('display-key').innerText = "NO ID DETECTED";
      }
    }
  </script>
</body>
</html>
