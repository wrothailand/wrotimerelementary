<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WRO LAP TIMER HYBRID PRO - NEUMORPHISM</title>
  
  <!-- Google Fonts, SweetAlert2 & DotLottie Web Component -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=JetBrains+Mono:wght@600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js" type="module"></script>
  
  <style>
    :root {
      /* Neumorphism Core Colors */
      --bg: #e0e5ec;
      --shadow-light: #ffffff;
      --shadow-dark: #a3b1c6;
      
      /* Text & Accent Colors */
      --text-main: #4a5568;
      --text-sub: #718096;
      --primary: #3b82f6;
      --warning: #f59e0b;
      --success: #10b981;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Kanit', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* วัตถุนูนขึ้น (Protruding) */
    .neu-flat {
      background-color: var(--bg);
      box-shadow: 9px 9px 16px var(--shadow-dark), 
                 -9px -9px 16px var(--shadow-light);
      border: none;
      transition: all 0.2s ease-in-out;
    }

    /* วัตถุบุ๋มลง (Indented / Pressed) */
    .neu-pressed {
      background-color: var(--bg);
      box-shadow: inset 6px 6px 10px 0 rgba(163, 177, 198, 0.7), 
                  inset -6px -6px 10px 0 rgba(255, 255, 255, 0.8);
      border: none;
    }

    /* Hover & Active states สำหรับปุ่ม */
    button.neu-flat:active {
      box-shadow: inset 4px 4px 8px 0 rgba(163, 177, 198, 0.7), 
                  inset -4px -4px 8px 0 rgba(255, 255, 255, 0.8);
    }
    button.neu-flat:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
    }

    .container {
      width: 92%;
      max-width: 450px;
      height: 90vh;
      background: var(--bg);
      padding: 2rem 1.5rem;
      border-radius: 40px; /* มุมโค้งมนมากขึ้น */
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    .header-info { margin-top: 0.2rem; }
    .version-tag { 
      font-size: 0.75rem; color: var(--text-sub); 
      font-weight: 600; letter-spacing: 2px; 
    }

    #team-info-display {
      margin-top: 15px; 
      min-height: 85px;
      padding: 15px;
      border-radius: 20px;
    }

    #display-team-name { 
      font-size: 1.4rem; font-weight: 700; color: var(--text-main); 
      line-height: 1.2; margin-top: 8px; 
    }
    
    #display-key { 
      font-size: 0.85rem; font-weight: 700; color: var(--primary); 
      display: inline-block; padding: 4px 14px; 
      border-radius: 20px;
    }

    .timer-display {
      font-size: clamp(4.5rem, 20vw, 7.5rem);
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-main);
      margin: 1rem 0;
      transition: color 0.2s ease;
      display: inline-block;
      width: 100%;
      text-shadow: 2px 2px 4px rgba(163,177,198,0.3);
    }
    
    .timer-display.counting { color: var(--primary); }
    .timer-display.warning-active {
      color: var(--danger);
      animation: pulseText 1.5s infinite;
    }

    @keyframes pulseText {
      0% { text-shadow: 0 0 10px rgba(239, 68, 68, 0.2); transform: scale(1); }
      50% { text-shadow: 0 0 20px rgba(239, 68, 68, 0.6); transform: scale(1.02); }
      100% { text-shadow: 0 0 10px rgba(239, 68, 68, 0.2); transform: scale(1); }
    }

    .progress-container {
      width: 100%; height: 16px; 
      border-radius: 20px; overflow: hidden; margin-bottom: 1.5rem;
    }
    #progress-bar { 
      width: 0%; height: 100%; 
      background: linear-gradient(90deg, #60a5fa, var(--primary)); 
      border-radius: 20px;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      transition: width 0.1s linear, background 0.3s;
    }
    #progress-bar.warning-active { 
      background: linear-gradient(90deg, #f87171, var(--danger)); 
    }

    .btn-setting { 
      color: var(--text-sub);
      padding: 8px 18px; border-radius: 20px; font-size: 0.85rem;
      cursor: pointer; margin-bottom: 0.5rem;
      font-family: 'Kanit'; font-weight: 600;
    }

    #save-zone {
      min-height: 55px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 5px;
    }

    /* สไตล์ปุ่มหลัก (ปรับให้เข้ากับ Neumorphism ผ่าน JS) */
    .neu-action-btn {
      width: 100%; padding: 1.4rem;
      font-size: 1.8rem; font-weight: 700; border-radius: 25px;
      cursor: pointer; 
      font-family: 'Kanit'; 
      letter-spacing: 2px;
    }
    
    .text-primary { color: var(--primary); }
    .text-warning { color: var(--warning); }
    .text-success { color: var(--success); }
    .text-danger { color: var(--danger); }

    .btn-save-top {
      padding: 10px 24px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 25px;
      cursor: pointer;
      color: var(--success);
      font-family: 'Kanit';
    }

    .control-grid-bottom {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
      margin-top: 20px;
    }
    .btn-bottom-style {
      padding: 1rem; border-radius: 15px;
      cursor: pointer; font-family: 'Kanit'; color: var(--text-main);
      font-weight: 600; font-size: 0.95rem;
    }

    .footer-credit {
      margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-sub);
      letter-spacing: 1px; font-weight: 400;
    }
    .footer-credit b { color: var(--primary); font-weight: 700; }

    .modal { 
      display: none; position: fixed; inset: 0; 
      background: rgba(224, 229, 236, 0.7); backdrop-filter: blur(8px);
      z-index: 1000; justify-content: center; align-items: center; 
    }
    .modal-content { 
      padding: 2.5rem; border-radius: 30px;
      width: 90%; max-width: 400px;
      text-align: left;
    }

    .modal-content h3 {
      margin-top: 0; color: var(--text-main); 
      padding-bottom: 15px; font-weight: 700;
      text-align: center;
    }

    .setting-group input {
      width: 100%; padding: 12px 15px; 
      border-radius: 15px; font-size: 1rem; outline: none;
      color: var(--text-main); font-family: 'Kanit';
      margin-top: 5px;
    }

    /* Toggle Switch แบบ Neumorphism */
    .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { 
      position: absolute; cursor: pointer; inset: 0; 
      border-radius: 26px; transition: .3s;
    }
    .slider:before { 
      position: absolute; content: ""; height: 18px; width: 18px; 
      left: 4px; bottom: 4px; background-color: var(--bg); 
      transition: .3s; border-radius: 50%; 
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }
    input:checked + .slider { box-shadow: inset 4px 4px 8px rgba(163,177,198,0.7), inset -4px -4px 8px rgba(255,255,255,0.8); }
    input:checked + .slider:before { transform: translateX(24px); background-color: var(--primary); }

    .history-item { 
      border-radius: 15px; margin-bottom: 12px; padding: 15px !important; 
      display: flex; justify-content: space-between; align-items: center;
    }
    #history-list::-webkit-scrollbar { width: 0; display: none; }

    .lottie-loading-wrapper {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .loading-cute-text {
      font-family: 'Kanit'; font-size: 1.05rem; color: var(--text-main);
      font-weight: 600; margin-top: 5px; text-align: center;
      min-height: 26px; transition: opacity 0.3s ease;
    }

    /* แทรกแซง SweetAlert ให้ออกมาเป็น Neumorphism */
    div:where(.swal2-container) div:where(.swal2-popup) {
      background: var(--bg) !important;
      border-radius: 30px !important;
      box-shadow: 15px 15px 30px var(--shadow-dark), -15px -15px 30px var(--shadow-light) !important;
      color: var(--text-main) !important;
    }
    div:where(.swal2-container) button:where(.swal2-styled) {
      background: var(--bg) !important;
      color: var(--text-main) !important;
      border-radius: 20px !important;
      box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light) !important;
      border: none !important;
      font-family: 'Kanit' !important;
      font-weight: 600 !important;
    }
    div:where(.swal2-container) button:where(.swal2-styled):active {
      box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light) !important;
    }
    div:where(.swal2-container) h2:where(.swal2-title) { color: var(--text-main) !important; }
    div:where(.swal2-container) div:where(.swal2-html-container) { color: var(--text-sub) !important; }

    @media (min-height: 800px) { .container { height: 740px; } }
  </style>
</head>
<body>

<div class="container neu-flat">
  <div id="save-zone"></div>

  <div class="header-info">
    <div class="version-tag">WRO 2026 OFFICIAL TIMER | V.2.9.0 </div>
    
    <div id="team-info-display" class="neu-pressed">
      <div id="display-key" class="neu-flat">CHECKING ID</div>
      <div id="display-team-name">กำลังโหลดข้อมูล...</div>
      <div id="display-institution" style="font-size: 0.95rem; color: var(--text-sub); margin-top: 4px; font-weight: 500;">PLEASE WAIT</div>
    </div>
  </div>

  <div style="margin-top: 10px;">
    <button class="neu-flat btn-setting" id="settingBtn" onclick="openSettings()">LIMIT: 120.00s ⚙️</button>
    <div class="timer-display" id="display">0.00</div>
    <div class="progress-container neu-pressed">
      <div id="progress-bar"></div>
    </div>
  </div>

  <div style="width: 100%;">
    <div id="action-controller">
      <!-- ปุ่มเปลี่ยนเป็นใช้ Class ของ Neumorphism -->
      <button id="actionBtn" class="neu-flat neu-action-btn text-primary" onclick="handleAction()">START</button>
    </div>

    <div class="control-grid-bottom">
      <button class="neu-flat btn-bottom-style" onclick="showHistory()">HISTORY 📋</button>
      <button class="neu-flat btn-bottom-style text-danger" onclick="confirmReset()">RESET 🔄</button>
    </div>

    <div class="footer-credit">CREATE BY <b>GOZAMA</b></div>
  </div>
</div>

  <div id="settingModal" class="modal">
    <div class="modal-content neu-flat">
      <h3>ตั้งค่านาฬิกา</h3>
      
      <div class="setting-group" style="margin-top: 15px;">
        <label style="display: block; font-size: 0.9rem; color: var(--text-sub); margin-bottom: 6px; font-weight:600;">เวลาแข่งขัน (วินาที)</label>
        <input type="number" id="setLimit" value="120" class="neu-pressed">
      </div>
      
      <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0;">
        <span style="font-size: 0.95rem; font-weight:600; color: var(--text-main);">นับถอยหลังก่อนเริ่ม (3 วินาที)</span>
        <label class="switch">
          <input type="checkbox" id="setCountdown">
          <span class="slider neu-pressed"></span>
        </label>
      </div>
      
      <div class="setting-group" style="margin-top: 20px;">
        <label style="display: block; font-size: 0.9rem; color: var(--text-sub); margin-bottom: 6px; font-weight:600;">เตือนช่วงท้าย (วินาทีที่เหลือ)</label>
        <input type="number" id="setWarnAt" value="10" class="neu-pressed">
      </div>
      
      <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0;">
        <span style="font-size: 0.95rem; font-weight:600; color: var(--text-main);">เสียงเตือนล่วงหน้า</span>
        <label class="switch">
          <input type="checkbox" id="setWarning" checked>
          <span class="slider neu-pressed"></span>
        </label>
      </div>
      
      <button class="neu-flat" style="width:100%; margin-top:15px; padding:15px; font-size: 1.1rem; border-radius: 20px; color:var(--primary); font-family: 'Kanit'; font-weight:700; cursor:pointer;" onclick="saveSettings()">บันทึกการตั้งค่า</button>
      <button class="neu-flat" style="width: 100%; margin-top: 15px; padding:12px; border-radius: 20px; font-family: 'Kanit'; color: var(--text-sub); cursor:pointer;" onclick="document.getElementById('settingModal').style.display='none'">ยกเลิก</button>
    </div>
  </div>

  <div id="history-modal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content neu-flat" onclick="event.stopPropagation()" style="max-width: 450px;">
      <h3>ประวัติการบันทึก (เครื่องนี้)</h3>
      <div id="history-list" style="max-height: 45vh; overflow-y: auto; padding-right: 5px; padding-top: 10px;"></div>
      <button class="neu-flat" style="width: 100%; margin-top: 25px; padding:15px; border-radius: 20px; font-family: 'Kanit'; color: var(--text-sub); cursor:pointer; font-weight: 600;" onclick="document.getElementById('history-modal').style.display='none'">ปิดหน้าต่าง</button>
    </div>
  </div>

  <script>
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-5W0x3pSIlwE-vCUNOai_mJzQaEZ3gRLhsddK67Dwv3qVWO6qK-qu7U2CGWMUCRe-sQ/exec"; 

    let globalRowKey = ""; 
    let CONFIG = {
      limit: parseFloat(localStorage.getItem('cfg_limit')) || 120,
      useCountdown: localStorage.getItem('cfg_useCountdown') === 'true',
      useWarning: localStorage.getItem('cfg_useWarning') !== 'false',
      warnAt: parseFloat(localStorage.getItem('cfg_warnAt')) || 10
    };
    
    let state = "IDLE"; 
    let startTime, elapsedTime = 0, timerInterval = null, countdownInt = null;
    let lastBeepSecond = -1;
    let textRotationInterval = null;

    let myDeviceID = localStorage.getItem('timer_device_id');
    if (!myDeviceID) {
      myDeviceID = 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
      localStorage.setItem('timer_device_id', myDeviceID);
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playBeep(freq = 880, dur = 0.1) {
      try {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine"; 
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
      } catch (e) { console.error("Audio error:", e); }
    }

    function unlockIOSAudio() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const buffer = audioCtx.createBuffer(1, 1, 22050);
      const source = audioCtx.createBufferSource();
      source.buffer = buffer; source.connect(audioCtx.destination);
      source.start(0);
    }

    function setControlsEnabled(enabled) {
      document.getElementById('settingBtn').disabled = !enabled;
    }

    function directClose() {
      window.open('', '_self', ''); window.close(); 
      if (navigator.app && navigator.app.exitApp) navigator.app.exitApp();
      setTimeout(() => {
        const fallbackUrl = "https://www.appsheet.com/start/4a35a640-88de-4af9-900f-2f08fb713f0a";
        try { window.top.location.href = fallbackUrl; } catch(e) { window.location.href = fallbackUrl; }
      }, 200);
    }

    const isGoogleEnv = (typeof google !== 'undefined' && google.script && google.script.run);

    function callBackend(action, params, callback) {
      if (isGoogleEnv) {
        if (action === 'getTeamInfo') {
          google.script.run.withSuccessHandler(callback).getTeamInfo(params.rowKey);
        } else if (action === 'saveTime') {
          google.script.run.withSuccessHandler(callback).saveTime(params.timeStr, params.deviceID, params.rowKey);
        } else if (action === 'getHistory') {
          google.script.run.withSuccessHandler(callback).getHistory(params.deviceID);
        }
      } else {
        let url = `${GAS_WEB_APP_URL}?action=${action}`;
        for (let key in params) { url += `&${key}=${encodeURIComponent(params[key])}`; }
        fetch(url)
          .then(res => res.json())
          .then(data => callback(data))
          .catch(err => {
            console.error("API Error:", err);
            Swal.fire('Error', 'การเชื่อมต่อฐานข้อมูลล้มเหลว', 'error');
            if(action === 'getTeamInfo') callback(null);
          });
      }
    }

    function getURLParameters(callback) {
      if (isGoogleEnv) {
        google.script.url.getLocation(function(location) {
          let key = location.parameter.rowKey || (location.parameters && location.parameters.rowKey ? location.parameters.rowKey[0] : "");
          callback(key);
        });
      } else {
        const urlParams = new URLSearchParams(window.location.search);
        callback(urlParams.get('rowKey') || "");
      }
    }

    function renderButtonUI() {
      const mainController = document.getElementById('action-controller');
      const saveZone = document.getElementById('save-zone');
      
      // อัปเดต Class เป็นของ Neumorphism โดยใช้สีตัวอักษรแทนสีพื้นหลัง
      if (state === "IDLE") {
        mainController.innerHTML = `<button id="actionBtn" class="neu-flat neu-action-btn text-primary" onclick="handleAction()">START</button>`;
        saveZone.innerHTML = "";
      } 
      else if (state === "COUNTING") {
        mainController.innerHTML = `<button id="actionBtn" class="neu-pressed neu-action-btn text-sub" style="opacity: 0.5; cursor: not-allowed;" disabled>COUNTDOWN</button>`;
        saveZone.innerHTML = "";
      } 
      else if (state === "RUNNING") {
        mainController.innerHTML = `<button id="actionBtn" class="neu-pressed neu-action-btn text-warning" onclick="pauseRunning()">PAUSE / STOP</button>`;
        saveZone.innerHTML = "";
      } 
      else if (state === "PAUSED") {
        mainController.innerHTML = `<button id="actionBtn" class="neu-flat neu-action-btn text-primary" onclick="resumeRunning()">RESUME</button>`;
        saveZone.innerHTML = `<button class="neu-flat btn-save-top" onclick="confirmSave()"><i class="fa-solid fa-floppy-disk"></i> SAVE RESULT</button>`;
      } 
      else if (state === "FINISHED") {
        mainController.innerHTML = `<button id="actionBtn" class="neu-pressed neu-action-btn" style="opacity: 0.4; cursor:not-allowed;" disabled>TIME OVER</button>`;
        saveZone.innerHTML = `<button class="neu-flat btn-save-top" onclick="confirmSave()"><i class="fa-solid fa-floppy-disk"></i> SAVE RESULT</button>`;
      }
    }

    function handleAction() {
      if (state === "IDLE") {
        unlockIOSAudio();
        if (CONFIG.useCountdown) {
          startCountdown();
        } else {
          startRunning();
        }
      }
    }

    function startCountdown() {
      state = "COUNTING";
      renderButtonUI();
      setControlsEnabled(false);
      
      const display = document.getElementById('display');
      display.classList.add('counting');
      
      let lastTriggeredSecond = -1;
      const countdownDuration = 3000;
      const countdownStart = Date.now();

      countdownInt = setInterval(() => {
        const timePassed = Date.now() - countdownStart;
        const timeLeft = countdownDuration - timePassed;
        const currentCount = Math.ceil(timeLeft / 1000);

        if (timeLeft > 0) {
          if (currentCount !== lastTriggeredSecond) {
            display.innerText = currentCount;
            playBeep(440, 0.1);
            lastTriggeredSecond = currentCount;
          }
        } else {
          clearInterval(countdownInt);
          countdownInt = null;
          display.classList.remove('counting');
          playBeep(880, 0.3);
          startRunning();
        }
      }, 16);

      display.innerText = "3";
      playBeep(440, 0.1);
      lastTriggeredSecond = 3;
    }

    function startRunning() {
      state = "RUNNING";
      renderButtonUI();
      setControlsEnabled(false);
      startTime = Date.now() - elapsedTime;
      timerInterval = setInterval(update, 10);
    }

    function pauseRunning() {
      if (state === "RUNNING") {
        clearInterval(timerInterval);
        timerInterval = null;
        state = "PAUSED";
        setControlsEnabled(true);
        renderButtonUI();
        displayTime(elapsedTime);
      }
    }

    function resumeRunning() {
      if (state === "PAUSED") {
        state = "RUNNING";
        renderButtonUI();
        setControlsEnabled(false);
        startTime = Date.now() - elapsedTime;
        timerInterval = setInterval(update, 10);
      }
    }

    function update() {
      const now = Date.now();
      elapsedTime = now - startTime;
      const limitMs = CONFIG.limit * 1000;
      
      if (elapsedTime >= limitMs) { 
        elapsedTime = limitMs; 
        clearInterval(timerInterval);
        timerInterval = null;
        state = "FINISHED";
        renderButtonUI();
        setControlsEnabled(true);
        playBeep(440, 0.5); 
        displayTime(elapsedTime);
        return;
      }
      
      const currentSec = Math.floor(elapsedTime / 1000);
      const remainSec = CONFIG.limit - currentSec;
      const display = document.getElementById('display');
      const progressBar = document.getElementById('progress-bar');
      
      if (CONFIG.useWarning && remainSec <= CONFIG.warnAt && state === "RUNNING") {
        display.classList.add('warning-active');
        progressBar.classList.add('warning-active');
        if (currentSec !== lastBeepSecond && elapsedTime < limitMs) {
          playBeep(880, 0.1);
          lastBeepSecond = currentSec;
        }
      } else {
        display.classList.remove('warning-active');
        progressBar.classList.remove('warning-active');
      }
      displayTime(elapsedTime);
    }

    function displayTime(ms) {
      document.getElementById('display').innerText = (ms / 1000).toFixed(2);
      const percentage = (ms / (CONFIG.limit * 1000)) * 100;
      document.getElementById('progress-bar').style.width = Math.min(percentage, 100) + "%";
    }

    function reset() {
      if (timerInterval) clearInterval(timerInterval);
      if (countdownInt) clearInterval(countdownInt);
      timerInterval = null;
      countdownInt = null;
      
      state = "IDLE";
      elapsedTime = 0;
      lastBeepSecond = -1;
      
      setControlsEnabled(true);
      renderButtonUI();
      displayTime(0);
      
      document.getElementById('display').classList.remove('warning-active', 'counting');
      document.getElementById('progress-bar').classList.remove('warning-active');
    }

    function confirmSave() {
      const timeStr = (elapsedTime / 1000).toFixed(2);
      Swal.fire({
        title: 'บันทึกเวลาแข่งขัน?',
        text: `เวลา: ${timeStr} วินาที`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: 'var(--success)', /* ใช้สีตัวแปร css ใน sweetalert */
        confirmButtonText: 'ใช่, กดสิจ๊ะ',
        cancelButtonText: 'ยกเลิก',
        customClass: { confirmButton: 'neu-flat text-success', cancelButton: 'neu-flat' }
      }).then((result) => { if (result.isConfirmed) saveToSheet(timeStr); });
    }

    function saveToSheet(timeStr) {
      if (!globalRowKey) { 
        Swal.fire('Error', 'ไม่พบข้อมูล ID ทีมใน URL ลิงก์', 'error');
        return; 
      }
      
      const loadingTexts = [
        "กำลังส่งนะ รอหน่อยนะ...",
        "เน็ตอาจจะช้านิดนึง...",
        "รอน่าจะไม่เกิน 10 วินาที หรอกมั้ง...",
        "กำลังเซฟลง Google Sheets...",
        "เซฟเสร็จละ ก็บอกแล้วแปบเดียว..."
      ];
      
      Swal.fire({
        html: `
          <div class="lottie-loading-wrapper">
            <dotlottie-wc 
              src="https://lottie.host/f535a150-e558-4562-a2a6-a347fa61f491/cT08C07HGd.lottie" 
              style="width: 220px; height: 220px;" 
              autoplay 
              loop>
            </dotlottie-wc>
            <div id="cute-loading-msg" class="loading-cute-text">${loadingTexts[0]}</div>
          </div>
        `,
        showConfirmButton: false,
        allowOutsideClick: false,
        allowEscapeKey: false,
        didOpen: () => {
          let textIdx = 1;
          textRotationInterval = setInterval(() => {
            const textEl = document.getElementById('cute-loading-msg');
            if (textEl) {
              textEl.style.opacity = 0;
              setTimeout(() => {
                textEl.innerText = loadingTexts[textIdx % loadingTexts.length];
                textEl.style.opacity = 1;
                textIdx++;
              }, 150);
            }
          }, 1600);
        },
        willClose: () => {
          if (textRotationInterval) clearInterval(textRotationInterval);
        }
      });
      
      callBackend('saveTime', { timeStr: timeStr, deviceID: myDeviceID, rowKey: globalRowKey }, function(res) {
        Swal.close(); 
        if(res && res.success) {
          Swal.fire({ 
            icon: 'success',
            title: 'บันทึกแล้วจ้า!',
            text: `ผลการจับเวลา ${timeStr} วินาที เรียบร้อย`,
            allowOutsideClick: false,
            allowEscapeKey: false,
            confirmButtonText: '❌ กดปิดหน้าจอสิ',
            customClass: { confirmButton: 'neu-flat text-danger' }
          }).then((result) => { if (result.isConfirmed) { directClose(); } });
        } else {
          Swal.fire('เกิดข้อผิดพลาด', res ? res.error : 'ไม่สามารถส่งข้อมูลได้', 'error');
        }
      });
    }

    function confirmReset() {
      Swal.fire({ 
        title: 'Reset เวลา?', 
        text: 'กระบวนการนี้จะล้างเวลาปัจจุบันทิ้งทั้งหมด', 
        icon: 'warning', 
        showCancelButton: true, 
        confirmButtonText: 'ใช่, รีเซ็ต',
        cancelButtonText: 'ยกเลิก',
        customClass: { confirmButton: 'neu-flat text-danger', cancelButton: 'neu-flat' }
      })
      .then((result) => { if (result.isConfirmed) reset(); });
    }

    function openSettings() { 
      document.getElementById('setLimit').value = CONFIG.limit;
      document.getElementById('setCountdown').checked = CONFIG.useCountdown;
      document.getElementById('setWarning').checked = CONFIG.useWarning;
      document.getElementById('setWarnAt').value = CONFIG.warnAt;
      document.getElementById('settingModal').style.display = 'flex'; 
    }
    
    function saveSettings() {
      CONFIG.limit = parseFloat(document.getElementById('setLimit').value) || 120;
      CONFIG.useCountdown = document.getElementById('setCountdown').checked;
      CONFIG.useWarning = document.getElementById('setWarning').checked;
      CONFIG.warnAt = parseFloat(document.getElementById('setWarnAt').value) || 10;
      
      localStorage.setItem('cfg_limit', CONFIG.limit);
      localStorage.setItem('cfg_useCountdown', CONFIG.useCountdown);
      localStorage.setItem('cfg_useWarning', CONFIG.useWarning);
      localStorage.setItem('cfg_warnAt', CONFIG.warnAt);

      document.getElementById('settingBtn').innerText = `LIMIT: ${CONFIG.limit.toFixed(2)}s ⚙️`;
      document.getElementById('settingModal').style.display = 'none';
      reset();
    }

    function showHistory() {
      document.getElementById('history-modal').style.display = 'flex';
      loadHistoryData();
    }

    function loadHistoryData() {
      const list = document.getElementById('history-list');
      list.innerHTML = `<div style="padding:20px; opacity:0.5; text-align:center;">กำลังโหลดประวัติ...</div>`;
      
      callBackend('getHistory', { deviceID: myDeviceID }, function(data) {
        if (!data || data.length === 0) {
          list.innerHTML = `<div style="padding:20px; opacity:0.5; text-align:center;">ไม่มีประวัติการบันทึกของเครื่องนี้</div>`;
          return;
        }
        list.innerHTML = data.map(item => `
          <div class="history-item neu-pressed">
            <div style="text-align:left">
              <div style="font-size:0.9rem; color:var(--text-sub); font-weight:600;">
                ${item.date} | <span style="color:var(--primary); font-weight:bold;">ID: ${item.team}</span>
              </div>
            </div>
            <b style="font-size:1.25rem; align-self:center; color:var(--text-main)">${item.time}s</b>
          </div>
        `).join('');
      });
    }

    function loadTeamInfo(rowKey) {
      callBackend('getTeamInfo', { rowKey: rowKey }, function(info) {
        if (info) {
          document.getElementById('display-key').innerText = "TEAM ID: " + info.key;
          document.getElementById('display-team-name').innerText = info.teamName || "ไม่พบชื่อทีม";
          document.getElementById('display-institution').innerText = info.institution || "-";
        } else {
          document.getElementById('display-team-name').innerText = "ไม่พบ ID นี้ในระบบ";
          document.getElementById('display-institution').innerText = "โปรดตรวจสอบฐานข้อมูลชีต";
          document.getElementById('display-key').innerText = "ID: " + rowKey;
        }
      });
    }

    window.onload = function() {
      document.getElementById('settingBtn').innerText = `LIMIT: ${CONFIG.limit.toFixed(2)}s ⚙️`;
      
      document.addEventListener('touchstart', unlockIOSAudio, { once: true });
      document.addEventListener('click', unlockIOSAudio, { once: true });

      getURLParameters(function(rowKey) {
        globalRowKey = rowKey;
        if (globalRowKey) {
          loadTeamInfo(globalRowKey);
        } else {
          document.getElementById('display-team-name').innerText = "LAP TIMER PRO";
          document.getElementById('display-institution').innerText = "READY TO START (NO PARAMETER)";
          document.getElementById('display-key').innerText = "NO ID DETECTED";
        }
      });
    };
  </script>
</body>
</html>
